services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.arcwright.rule=Host(`arcwright.space`)"
      - "traefik.http.routers.arcwright.entrypoints=websecure"
      - "traefik.http.routers.arcwright.tls.certresolver=letsencrypt"
      - "traefik.http.services.arcwright.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  dokploy-network:
    external: true
